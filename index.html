<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartinha</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Envelope -->
  <div id="envelope-container">
    <img src="img/envelope.png" alt="Envelope" id="envelope" />
    <p>♡ x & n ♡</p>
  </div>

  <!-- Tela de letras -->
  <div id="letter-container">
    <div class="letter-window">
      <h1 id="letter-title">Você será meu pra sempre?</h1>

      <img src="img/cat_heart.gif" class="cat" id="letter-cat" />

      <div class="buttons" id="letter-buttons">
        <img src="img/yes.png" class="btn yes-btn" alt="Yes" />
        <div class="no-wrapper">
          <img src="img/no.png" class="btn no-btn" alt="No" />
        </div>
      </div>

      <p id="final-text" class="final-text">
        Agora não tem mais volta… você é oficialmente <strong>meu</strong> HAHA
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
